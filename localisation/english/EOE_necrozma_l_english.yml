l_english:

 EOE_branch.146.name:0 "§HZ-Crystals§!"
 EOE_branch.146.desc:0 "While sorting through the artifacts left by the Precursors, our survey teams noticed some peculiar crystals. The data refers to these as '§YZ-Crystals§!', which appear to have been used by our creators as powerful psionic energy containers. When properly channeled, they can release potent psionic pulses. Unfortunately, all the Z-Crystals we have collected so far are completely damaged. The good news is that the survey team also discovered, within the data related to the Z-Crystals, a location referred to as the 'Z-Crystal Research Division'. A few Z-Crystal samples might still remain there."
 EOE_branch.146.a:0 "Dispatch an archaeological team to search the Z-Crystal Research Division on [Root.GetName]"
 site_EOE_eevium_z:0 "Z-Crystal Research Division"
 site_EOE_eevium_z_intro:0 "According to the data, the Z-Crystal Research Division we are searching for is located on this planet."
 EOE_branch.139.name:0 "Research Complex Ruins"
 EOE_branch.139.desc:0 "By analyzing the acquired data, we quickly pinpointed the location of the research complex ruins on the planet."
 EOE_branch.139.a:0 "Continue the investigation!"
 EOE_branch.140.name:0 "Energy Crystals"
 EOE_branch.140.desc:0 "Fortunately, a large number of Z-Crystals were indeed preserved within these research complex ruins. The facility doesn't seem to have been responsible for producing Z-Crystals, but rather for using them in applied research. According to a few fragmentary records, Z-Crystals appear to be a specialty mineral from a small island region on our creators' homeworld. The crystals vary in color and feature different patterns. [Root.GetLeaderName] speculates that these colors and patterns represent different uses for the crystals, but this hypothesis still requires confirmation from more data. The only thing certain now is that, after millions of years, these undamaged Z-Crystals have lost the vast majority of the energy they once stored; however, the crystals remain extremely valuable for research."
 EOE_branch.140.a:0 "Continue the search!"
 EOE_branch.141.name:0 "§YZ-Crystal Resonator§!"
 EOE_branch.141.desc:0 "More data within the research complex have disproven [Root.GetLeaderName]'s initial hypothesis: the different colors and patterns are actually just decorative. The true differentiator for their use is the crystal's shape. Biconical Z-Crystals were mostly civilian, used as components in psionic circuits, and also seem to have been used in Pokémon battle competitions. Large-scale military Z-Crystals, conversely, were typically made round, which helps reduce energy loss and increase stability. The data here also contains detailed records on the specific method for using Z-Crystals: a special resonator is required to generate psionic fluctuations of a specific frequency to release their energy. We also found some ring-shaped resonators on site. According to the records, our creators would slip these rings onto their forelimbs to provide short-term energy charges for Pokémon in battle competitions.\nBut the truly astonishing discovery is a §Ymilitary-grade Z-Crystal§! sealed within a storage apparatus that still contains a tremendous amount of energy. Although the storage apparatus has been inactive for a long time, the special materials composing it seem to have effectively prevented the crystal's energy from dissipating. If necessary, we could perhaps also use it for military purposes; the vast energy it stores could likely enhance fleet combat effectiveness significantly for a short period.\nHowever, one question still troubles [Root.GetLeaderName]: Where did these crystals originate, and what is the principle behind their immense energy storage? We searched through all the data in the research complex but found only two lines:\nFormation Reason: Unknown.\nEnergy Storage Principle: Unknown."
 EOE_branch.141.a:0 "Continue monitoring research progress."
 r_EOE_eevium_z:0 "Z-Crystal Resonator"
 r_EOE_eevium_z_desc:0 "This intact military-grade Z-Crystal can provide an energy boost to our fleet for a short duration. According to calculations, if used properly, its stored energy should last for several million more years.\n\n§YSomething strange might happen upon use.§!"
 EOE_branch.149.name:0 "Faint Signal"
 EOE_branch.149.desc:0 "Our detectors have picked up a series of unusual particle signals. Through back-calculation, these particles appear to originate from the decay of a string of high-dimensional baryon signals, and the source of the signal may lie outside our universe. This suggests that something from beyond our cosmos might be attempting to communicate with us."
 EOE_branch.149.a:0 "Continue tracking the signal."
 EOE_branch.170.name:0 "Dimensional Rift"
 EOE_branch.170.desc:0 "After persistent tracking of the mysterious signals, our team finally pinpointed their source: a dimensional rift within the [EOE_ultra_rift_system.GetName] system. The origin of the signals likely lies beyond this rift."
 EOE_branch.170.a:0 "Organize a team for exploration."

 EOE_ultra_system_rift.name:0 "The Otherworld"
 EOE_branch.148.name:0 "Electromagnetic Anomaly"
 EOE_branch.148.desc:0 "Shortly after [Leader.GetName]'s probe entered the rift, it encountered severe instrument malfunctions; various devices failed almost simultaneously. For safety, [Leader.GetName] immediately retreated.\n\nBased on the garbled signals recorded during the instrument failure, our research department has preliminarily determined that a lethal electromagnetic barrier exists behind the rift. Unlike a simple lack of charge, the space behind this rift seems to drastically weaken all physical phenomena based on electromagnetic interaction. To enter the rift safely, we must develop countermeasures for such anomalous electromagnetic regions. The research department has formulated a special project to address this."
 EOE_branch.148.a:0 "Continue Exploration"
 EOE_branch.148.a.failtext:0 "The special project must be completed to enter safely"

 EOE_search_electromagnetic_chaotic:0 "Study Anomalous EM Region Countermeasures"
 EOE_search_electromagnetic_chaotic_DESC:0 "Our scientists believe the extremely weak electromagnetic interaction in this system might involve Grand Unified Theory. This will require a significant physics research expenditure."

 EOE_branch.147.name:0 "Lightless World"
 EOE_branch.147.desc:0 "After using expensive materials to protect all components of the rift probe, we were finally ready to depart.\n\nBehind the rift lies pure darkness. From radio waves to gamma rays, all instrument readings are below 10^-15, and even instrument noise has vanished. Even the best laboratories in our nation cannot achieve such perfect electromagnetic vacuum.\nCurrently, [Leader.GetName] still has no hypothesis for this phenomenon.\nNevertheless, our baryon detectors are still receiving signals, coming from three different directions. Which direction should we prioritize for exploration?"
 EOE_branch.147.a:0 "Lambda Particle Source Direction"
 EOE_branch.147.b:0 "Xi Particle Source Direction"
 EOE_branch.147.c:0 "Sigma Particle Source Direction"

 EOE_branch.150.name:0 "Ultra Deep Sea"
 EOE_branch.150.desc:0 "The Lambda particle source originated from deep beneath the surface of a lightless planet. The material density on this planet's surface is over 100 times that of normal rock, so the survey team spent considerable time drilling through it.\nAs the team ventured deeper underground, the instruments measuring electromagnetic waves finally began registering faint reactions. The closer the team got to the particle source, the stronger the electromagnetic reactions became, until they finally reached a cavern.\nThe cavern was dark and narrow, but compared to the outside world with zero electromagnetic waves, it was incredibly bright. Using night-vision equipment, they could see colorful crystals and coral-reef-shaped stones lining the cave walls. Translucent, jellyfish-like, bizarre entities floated within the cavern."
 EOE_branch.150.a:0 "Examine the signal source in the cavern"
 EOE_branch.151.name:0 "Ultra Jungle"
 EOE_branch.151.desc:0 "The Xi particle source originated from another planet in the system. The survey team's planet had extremely high density, with gravity nearly twenty times that of a normal planet, so they spent considerable time escaping its surface.\nApproaching the target planet, it still appeared to be a lightless world, but the electromagnetic wave instruments finally began registering faint reactions. The closer the team got to a particle source on the target planet's surface, the stronger the electromagnetic reactions became, until they finally reached a unique patch of the planet's surface.\nOn this patch of ground stood several tall, columnar objects resembling trees, their silhouettes reminiscent of... bipedal beings flexing their forelimb muscles. Although the environment remained dim, it was incredibly bright compared to other regions with zero electromagnetic waves."
 EOE_branch.151.a:0 "Examine the signal source on the surface"
 EOE_branch.152.name:0 "Ultra Megalopolis"
 EOE_branch.152.desc:0 "The Sigma particle source originated from architectural ruins on the opposite side of the planet. The planet the survey team was on was extremely small, even smaller than some asteroids in our universe. Thus, the team quickly reached the other side, where the electromagnetic wave instruments finally began registering faint reactions, intensifying until they reached a rugged patch of ground. Although traces were difficult to discern, the team's experienced archaeological experts identified this as the ruin of a collapsed building complex. Unfortunately, due to the special conditions here, the materials composing the ruins are also extremely dense, making detailed excavation difficult for now.\nAlthough the environment here remains dim, it is incredibly bright compared to regions with zero electromagnetic waves."
 EOE_branch.152.a:0 "Examine the signal source in the ruins"

 EOE_branch.153.name:0 "Ultra Deep Sea"
 EOE_branch.153.desc:0 "There were no sentient beings or consciousness of any kind in the cavern. The signal source was an old device within the cave. The continuous Lambda particle signal we detected appears to be noise from the device's unstable operation. [Leader.GetName] speculates that this device was likely used to maintain local electromagnetic field rules, allowing electromagnetic interactions to function normally. Due to the unique environment and concerns about damaging the surroundings, the research team decided not to study the device excessively.\nNotably, these jellyfish-like creatures exhibited significant aggression, constantly attempting to possess our team members. This is another reason the team decided to leave this place quickly.\nNext, after cautiously filtering out potential instrumental noise from the baryon signals, the survey team decided to investigate the Omega particle source direction."
 EOE_branch.153.a:0 "Continue Investigation"
 EOE_branch.154.name:0 "Ultra Jungle"
 EOE_branch.154.desc:0 "Although this patch of surface was unique, there was still no sentient life or consciousness. The signal source was an old device on the surface. The continuous Xi particle signal we detected appears to be noise from the device's unstable operation. [Leader.GetName] speculates this device was likely used to maintain local electromagnetic field rules. Due to the unique environment and concerns about damage, the research team decided against excessive study.\nNotably, our team was attacked by a muscular-looking local creature; fortunately, our armed personnel reacted quickly and subdued the attacker. This is another reason the team decided to leave quickly.\nNext, after filtering out potential noise, the survey team decided to investigate the Omega particle source direction."
 EOE_branch.154.a:0 "Continue Investigation"
 EOE_branch.155.name:0 "Ultra Megalopolis"
 EOE_branch.155.desc:0 "The survey team searched extensively but found no sentient life or consciousness. The signal source was an old device within the ruins. The continuous Sigma particle signal we detected appears to be noise from the device's unstable operation. [Leader.GetName] speculates this device was likely used to maintain local electromagnetic field rules. Due to the unique environment and concerns about damage, the research team decided against excessive study.\nNotably, our team encountered a massive local creature devouring architectural debris. Upon seeing our team, the giant monster gave chase, but our armed personnel managed to drive it back. This is another reason the team decided to leave quickly.\nNext, after filtering out potential noise, the survey team decided to investigate the Omega particle source direction."
 EOE_branch.155.a:0 "Continue Investigation"
 EOE_branch.156.name:0 "Ultra Megalopolis"
 EOE_branch.156.desc:0 "Having gained experience from previous explorations, our team gradually adapted to the bizarre environment of this space. This time, following the signal, they arrived at another planet's surface with faint electromagnetic signals.\nThe architecture here caught the team's attention. Amidst vast ruins, many buildings remained relatively intact, not having collapsed. Their style was uniform and unique: angular, smooth-surfaced, and very tall. A tall tower stood at the center of the building cluster, its tip emitting a bright white light.\nMost surprisingly, a civilization existed within these buildings. Our team had made countless speculations about possible intelligent life in this mysterious space, but the observed lifeform was unexpectedly normal: hairless, upright primates, highly similar to lifeforms that once existed on Sol III in our universe. Such lifeforms seem utterly incapable of adapting to the extreme environment here.\nFortunately, those beings seemed welcoming rather than resistant to our greetings. Meanwhile, the team's archaeologists found the signal source in nearby ruins and discovered a wealth of valuable data. Relying on this data, our science teams might be able to preliminarily analyze this signal."
 EOE_branch.156.a:0 "Commence signal analysis immediately"

 EOE_branch.1591.name:0 "Signal Analysis"
 EOE_branch.1591.desc:0 "After detailed study, our research department has analyzed part of the information regarding the source and nature of the space behind the rift, proposing a bold hypothesis: This space appears to be... a fragment of space located outside our universe but quite close in higher dimensions. The original universe of this star system seems to have fallen into some calamity, and the survivors within this fragment somehow managed to detach their system from their mother universe, drifting through subspace layers. The purpose of their signal might be to call for help.\n\nMeanwhile, the team in contact with the civilization in the ruins is actively seeking clues. The lifestyle of this civilization in the ruins is very strange; almost no individuals engage in production, yet they lack for nothing. They have a digestive system but show no signs of eating. Furthermore, nearly all individuals devoutly worship a deity they call the 'Great Light Deity'. In their legends, the Great Light Deity is their creator, holding dominion over light, love, unity, and boundless divine power; but it was also this deity, in the distant past, who took away the light, plunging this world into darkness.\nOur team is attempting to communicate with the locals to gain access to their sanctuary, the 'Central Tower'."
 EOE_branch.1591.a:0 "We must uncover the truth"

 EOE_branch.157.name:0 "Sanctum Priest"
 EOE_branch.157.desc:0 "Unexpectedly, before our team could obtain official permission, the ruler of this civilization invited us into the Central Tower.\nHe is both king and priest of the Great Light Deity; he appears somewhat aged and also somewhat mad. The most peculiar thing is that the priest directly used a language existing in our universe to communicate with us, allowing our translators to easily interpret his words. The priest seems to have been waiting for us, or for any civilization from our universe. He did not use mysterious, redundant words or preach doctrine, as we had anticipated. Instead, he concisely expressed his hope that we would organize a larger survey team to investigate all their buildings, technology, and ruins. He will provide full assistance for this. We must admit that the small team originally sent to explore the dimensional rift is completely incapable of surveying such a large area; the data stored in just a portion of the towers shown by the priest could take our entire team years to process.\nOf course, we asked him about the truth of the Great Light Deity legend and the reason for the complete lack of electromagnetic interaction in this space. He shook his head, stating he cannot provide the correct answers.\n\n'Of course I want to tell you everything I know. But my memory of most things has become severely erroneous, so chaotic that I cannot describe it with words. Also, as you can see, this star system fragment, or \"§MUltra Space§!\", has almost nothing in it. I lack the resources to investigate anything myself. That's why I so desperately want your help to investigate.'\n'Let me try to describe what I still remember clearly, using words you can understand.'\n'Once, I was a ruler on an ordinary planetary civilization. Nearing senescence, I underwent experimental therapy and became the first immortal being in that civilization. Over the long years, I accumulated abilities and vision, eventually unifying the entire planet and sending my people into space.'\n'Once, I was an ordinary technician in that spacefaring civilization. During an experiment, I noticed an odd signal of spatial distortion. Research into that signal led to the invention of the warp drive. Because of this epoch-making contribution, I also became immortal, witnessing my civilization leave its home system, flying towards the distant unknown universe.'\n'That ruler led our civilization to expand territory. That millennium was our fastest period of development. The ruler conducted diplomacy peacefully with other galactic civilizations, protecting our interests. Our civilization established colony after colony, overcoming numerous difficulties, building vast cities on harsh planets, until our productive capacity could eventually support massive space engineering projects.'\n'Once, I was an ordinary engineer in the stargate construction project. Transportation is fundamental to limiting a civilization's scale. During the engineering work, I already had the idea of connecting the entire galaxy, even the entire universe. Fortunately, I took over the baton from that ruler and, over the following millions of years, could gradually realize my ambition: constructing an immense wormhole network, gradually connecting civilizations across the entire supercluster, even the entire universe.'\n'Our achievements were brilliant and dazzling, but fragile in the face of cosmic calamities. However, the projects I built proved worthwhile: we encountered a civilization technologically advanced enough to take all of us away from our mother universe...'\n'My subsequent memories are too scrambled; I can only recall this much. But nonetheless, the fact that I still survive suggests that their plan to escape the mother universe was probably successful.'\n\nAs part of his assistance, the priest then took us to see a wormhole generator. If we can use this device to create and maintain a stable wormhole connecting our universe and Ultra Space, we can send more personnel and equipment to conduct detailed investigations of this mysterious space, the calamity their mother universe experienced, and the technologies they used. Our team has identified several systems within our borders suitable for establishing connection points."

# EOE_branch.1571.name:0 "Sanctum Priest" #For diplomacy text insertion
# EOE_branch.1571.desc:0 "..."

 EOE_branch.157.a:0 "Establish wormhole at [EOE_wormsystem_4.GetName]"
 EOE_branch.157.b:0 "Establish wormhole at [EOE_wormsystem_1.GetName]"
# EOE_branch.157.c:0 "Establish wormhole at [EOE_wormsystem_2.GetName]"
# EOE_branch.157.d:0 "Establish wormhole at [EOE_wormsystem_3.GetName]"
 EOE_branch.157.e:0 "Potential unknown dangers; abandon further investigation"

 NAME_EOE_ultra_megalopolis:0 "Ultra Megalopolis"
 EOE_branch.158.name:0 "Ultra Megalopolis"
 EOE_branch.158.desc:0 "We have located the planet in Ultra Space that features tall buildings and a subluminal civilization. The subluminal civilization occupies only a tiny portion of this planet and is technologically far inferior to the artifacts our survey team unearthed there. It is time to send professional archaeologists here to begin a thorough investigation of this planet and this entire space."
 EOE_branch.158.a:0 "Commence investigation as soon as possible"

 ultra_space_age:0 "Ultra Space Civilization"
 ultra_space_age_desc:0 "A civilization residing within a mysterious space, possessing an unusual technological path and an implausibly small population."

 sc_black_drawf:0 "Black Dwarf"
 pc_black_drawf:0 "Black Dwarf"
 pc_black_drawf_desc:0 "A dark stellar core that has lost the vast majority of its matter and energy. A type of star that should not exist in a young universe."
 pc_EOE_nolight:0 "Lightless Planet"
 pc_EOE_nolight_desc:0 "A dense planet that has collapsed after having most of its electromagnetic energy drained away, losing its supporting force. Any type of electromagnetic wave decays rapidly, leaving the planet's surface shrouded in darkness."
 pc_EOE_nolight_habit:0 "$pc_EOE_nolight$"
 pc_EOE_nolight_habit_desc:0 "$pc_EOE_nolight_desc$"
 trait_pc_EOE_nolight_habit_preference:0 "Lightless Planet Habitability"

 site_necrozma_system:0 "Ultra Megalopolis"
 site_EOE_ultra_city_intro:0 "This civilization appears to be a survivor of a cosmic-level calamity. They left behind vast amounts of difficult-to-decipher data and ancient technology awaiting excavation."
 EOE_branch.160.name:0 "Data Organization"
 EOE_branch.160.desc:0 "With the High Priest's help, everyone provided whatever assistance they could to our team, greatly facilitating our investigation. Nevertheless, our research team expended an immense amount of time collecting, organizing, and analyzing the data and records left within the Central Tower and other buildings.\nOverall, the results are somewhat disappointing: most of this data originates from an external universe with entirely different rules, making complete comprehension impossible. We can only roughly infer that civilization in that universe was once prosperous and highly developed. Among the more recent data, which is slightly more readable, our archaeologists noticed that an entity they called §YNecrozma§! appeared with surprisingly high frequency. Although the specific role of this entity remains unknown, we attempted to reconstruct its appearance within our universe: a golden, radiant, dragon-like entity with two pairs of wings and large legs. Interestingly, Necrozma's appearance seems to perfectly match the image of the 'Great Light Deity' worshiped by this civilization. However, scientists believe more conclusive evidence is needed before drawing final conclusions.\nMeanwhile, other research groups are also actively investigating. The reverse-engineering technology team is sampling and analyzing the architecture here, providing new directions for our construction technology research. The physics research team is analyzing the composition and background signals of all of Ultra Space; their results are also highly anticipated."
 EOE_branch.160.a:0 "Well done. Continue the investigation!"
 EOE_branch.161.name:0 "Anomalous Rules"
 EOE_branch.161.desc:0 "The physics team conducted long-term observations of Ultra Space's spacetime structure and particle signals, tracing its history. The analysis indicates that Ultra Space's physical rules have undergone changes of varying magnitudes. The initial rule change was brief and extremely violent; within seconds, the original exotic physics were altered to be nearly identical to our universe's rules. Contrary to our experts' predictions, at that time, electromagnetic interactions in Ultra Space were normal. However, over the following billions of years, the physical rules here seem to have slowly drifted in the wrong direction. The current physical anomalies appear to be the accumulation of this long period of drift, with the electromagnetic anomaly being just one external manifestation.\nAfter receiving the archaeology team's report on the entity 'Necrozma', the physics team measured it from a particle signal perspective. The results show that the entity 'Necrozma' indeed left very distinct traces in early Ultra Space, indicating its significant influence. However, approximately one million years ago, Necrozma's signal underwent a sudden drop, becoming completely submerged in noise, almost disappearing.\nThe combined work of the physics and archaeology teams provides strong evidence for the hypothesis that 'this space originated from another universe'; however, the directly obtainable information ends here.\n\nAt an impasse, some scientists on the physics team noticed Necrozma's characteristic signal emanating from the Central Tower in the Megalopolis. After searching and eliminating other sources, we determined that the signal originated from a lustrous, black, biological-looking object within the tower's top-floor chamber. This black object does not resemble Necrozma at all and appears completely devoid of any physiological activity. All three of our research teams are now shifting their focus to study this suspected 'Necrozma' black entity."
 EOE_branch.161.a:0 "Continue research."
 EOE_branch.162.name:0 "Dysfunction"
 EOE_branch.162.desc:0 "Our research teams analyzed 'Necrozma' using various instruments. The entity appears calm but contains immense energy. It currently appears to be in an abnormal state of dysfunction, its energy pathways blocked unnaturally. The blockage seems caused by rule errors and information corruption. Based on the understanding of the anomalous rules throughout this region, the physics team believes it might be possible to awaken this crucial black organism by artificially repairing the rules and information. Using the physics team's theoretical models and reverse-engineering existing rule stabilizers in the Ultra Megalopolis, our engineering team quickly produced a design for a device to awaken 'Necrozma'."
 EOE_branch.162.a:0 "Attempt to awaken it"
 EOE_branch.163.name:0 "Awakening Attempt Failed"
 EOE_branch.163.desc:0 "Unfortunately, although the device functioned correctly, our awakening attempt failed. While we could correct the erroneous rules, the corrupted information could not be recovered. The vast number of anomalous quanta accumulated within 'Necrozma' due to rule errors continues to block its energy pathways. Although the engineering team has methods to modify quantum states, we do not know the original correct state of these particles, leaving us powerless.\n\nHowever, after sending the news back home, a new clue emerged: Z-Crystals display vibrational patterns nearly identical to Necrozma's!\nExcited, the research team immediately obtained Z-Crystals for study. These crystals not only match the black entity's waveform, but even the microscopic marks on them align with the history of rule changes in this spacetime. These Z-Crystals most likely originated from the earliest phase of the drastic rule modification in this mysterious space. In this model, the initial violent rule change in Ultra Space caused energy leakage; some matter particles in our universe captured and imprisoned this energy, forming Z-Crystals.\nBecause Z-Crystals carry information related to Necrozma from that earliest period, the engineering team believes that, by modifying them, this information can be used to correct the anomalous quanta within Necrozma.\n\n§RWaking Necrozma may present unpredictable dangers. Therefore, during preparations, unrelated personnel and vessels should stay away from the engineering base vicinity.§!"
 EOE_branch.163.a:0 "Authorize the use of Z-Crystals"
 EOE_branch.164.name:0 "§RHigh-Energy Reaction§!"
 EOE_branch.164.desc:0 "During the anomalous quantum correction process, an energy pathway unexpectedly connected, and Necrozma's energy levels began rising uncontrollably. It emitted extremely bright light and tremendous energy, melting our equipment. For safety, our science team has evacuated promptly. Based on the rate of energy increase, our team estimates that Necrozma's internal energy will peak within 30 days! We may need some way to calm Necrozma down to continue working..."
 EOE_branch.164.a:0 "Security ensured. Continue awakening and restoration."
 EOE_branch.165.name:0 "§YNecrozma Rampant§!"
 EOE_branch.165.desc:0 "The rampant Necrozma released enormous energy, destroying the Megalopolis and moving into space to attack our facilities!"
 EOE_branch.165.a:0 "Prepare the fleet!"
 EOE_branch.166.name:0 "Stabilization"
 EOE_branch.166.desc:0 "We managed to temporarily incapacitate Necrozma, quickly rebuilt the equipment, and began the latter half of the awakening process. No further incidents occurred during the remaining restoration.\nAs the Z-Crystals hummed in the instruments, feeding the final energy into Necrozma, the remaining anomalous quanta were finally corrected. Our fleet stood ready, but fortunately, Necrozma's functions appeared to operate normally. The intensity of its emitted light began to stabilize, revealing the golden exterior described in the records. The damage our ships' weapons inflicted moments ago began repairing itself at a visible rate. Simultaneously, all our vessels' signal receivers picked up a powerful communication signal."
 EOE_branch.166.a:0 "Establish communication."

 EOE_branch.167.name:0 "Necrozma"
 EOE_branch.167.desc:0 "Greetings, [Root.GetSpeciesNamePlural]. Allow me to introduce myself properly: I am Necrozma, the scripter of Ultra Space's rules. From the moment you began repairing the erroneous rules that bound me, my perception has been restored. I am aware of everything that has happened since.\nFirst, I must thank you for your assistance. Not only did you connect Ultra Space to your universe via a wormhole, but you also awakened me. Had you not come, Ultra Space might have slid into an abyss of rule imbalance, losing everything.\nSecond, I must apologize for my rampage. My mis-calibration of defensive thresholds led to that loss of control. I will do my utmost to provide compensation for your losses and express my gratitude."
 EOE_branch.167.a:0 "What are you?"
 EOE_branch.167.a.reply:0 "I am Necrozma, the aggregate of the former Necrozma species, as manifested under your universe's rules. Unfortunately, perhaps due to the accumulation of errors, I no longer feel like any kind of aggregate, but merely a single individual."
 EOE_branch.167.b:0 "What happened to your former universe?"
 EOE_branch.167.b.reply:0 "In your universe's language: a rapid Big Crunch.\nAmidst wars between several civilizations spanning superclusters, universe-constant weapons were used illegally, causing our universe to begin collapsing rapidly, centered on their supercluster. At the time, we Necrozma, as the only civilization capable of leaving our universe, did our utmost to place all sentient life individuals we could save into a hastily constructed subspace — what you see as Ultra Space. To save space, all individuals of each species were aggregated into a single entity; the Necrozma civilization I once represented was no exception.\nWe originally planned, upon entering a new universe, to attempt to restore all aggregates into full civilizations of individuals. Unfortunately, due to information corruption, this is likely no longer possible."
 EOE_branch.167.c:0 "Why has Ultra Space become like this?"
 EOE_branch.167.c.reply:0 "The Big Crunch in our former universe came too quickly. Therefore, this hastily built Ultra Space was far from meeting stability design standards. Being a minuscule volume, the rate of rule and information corruption in Ultra Space was astonishing. Even though I constantly tried to maintain the subspace, my own information loss caused me to neglect repairs to some rules. One external manifestation of those neglected rules, as you saw, was the disappearance of electromagnetic interaction.\nEvery individual you saw in the Ultra Megalopolis is an aggregate of an entire species from the original universe. Originally, all planets here were filled with such individuals. However, as you now know, as electromagnetic interaction weakened, these planets lost their structural support and collapsed gravitationally into dense lumps. As you observed, only the Ultra Megalopolis, which housed a rule stabilization device, along with a few experimental sites on other planets, retained electromagnetic interaction."
 EOE_branch.167.d:0 "Can Ultra Space's rules be repaired?"
 EOE_branch.167.d.reply:0 "Thanks to the Z-Crystals you provided, I have recovered some of my lost information, and can now attempt to repair Ultra Space's rules. However, on one hand, this repair is not permanent; as a tiny subspace unit, Ultra Space will eventually succumb to rule corruption again. On the other hand, my energy reserves are less than one trillionth of what they once were, completely insufficient to repair rule errors of this magnitude."
 EOE_branch.167.e:0 "What are your plans now?"
 EOE_branch.167.e.reply:0 "If Ultra Space can be successfully repaired, and with your permission, I will attempt to use your universe's resources to construct a larger, more stable subspace, to prepare for potential future calamities in your universe. Even with sufficient energy, the construction process would take tens of thousands of years. I only hope that time does not come too soon."
 EOE_branch.167.f:0 "Can you assist our scientific research?"
 EOE_branch.167.f.reply:0 "Certainly. As an outsider, my grasp of your universe's rules will ultimately be inferior to yours. Collaborative research would benefit us both."
 EOE_branch.167.g:0 "We require your strength."
 EOE_branch.167.g.reply:0 "No problem. However, until the physical rules are fully repaired, I may still require rule stabilization devices to meaningfully interact with your universe."
 EOE_branch.167.h:0 "End communication"

 EOE_necrozma_research:0 "Necrozma's Technological Assistance"
 EOE_necrozma_research_desc:0 "Necrozma was once an extremely advanced species, possessing unique insights into science and technology."

 EOE_branch.168.name:0 "Necrozma"
 EOE_branch.168.desc:0 "Stabilizer activation detected. For the next ten years, I will follow your commands."
 EOE_branch.168.a:0 "End communication"
 EOE_branch.169.name:0 "Necrozma"
 EOE_branch.169.desc:0 "Stabilizer deactivation detected. Activate it again should you require my service."
 EOE_branch.169.a:0 "End communication"

