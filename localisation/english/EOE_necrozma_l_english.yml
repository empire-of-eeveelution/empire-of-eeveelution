EOE_branch.69.name: "The Mysterious Supernova"
EOE_branch.69.desc: "We have received highly unusual subspace telemetry from the §H[destroyed_system.GetName]§! system. If our readings are correct, the primary star of that system turned into a supernova in an instant, producing a devastating effect. All planets have been shattered, and any starships or space stations that appeared in this star system have been destroyed. The star itself collapsed into a black hole.\n\nUnconfirmed reports indicate that there is only one survivor of this cataclysmic disaster — a colossal entity belonging to §H[crisis_country.GetName]§! ..."
EOE_branch.69.a: "What are they plotting in secret?"
EOE_branch.70.name: "Star System Destroyed"
EOE_branch.70.desc: "The entire §H[destroyed_system.GetName]§! system has been utterly annihilated! A colossal vessel belonging to §H[crisis_country.GetName]§! positioned itself above the system's primary star, and somehow triggered an event that can only be described as a supernova explosion, completely destroying the rest of the star system. The star itself collapsed into a black hole.\n\nOnly the entities of [crisis_country.GetSpeciesName] — which they apparently call '§HNecrozma§!' — survived this calamity. The evidence is now conclusive: [crisis_country.GetName] possesses the technology and means to completely destroy an entire star system."
EOE_branch.70.a: "This changes everything..."
EOE_branch.71.name: "Annihilation of a Star System"
EOE_branch.71.desc: "Telemetry from the §H[destroyed_system.GetName]§! system indicates that the primary star of this system turned into a supernova in an instant. The incredibly violent shockwave destroyed everything within this star system, and the star itself collapsed into a black hole.\n\nHowever, §H[crisis_country.GetName]§! does not appear to be using the Star-Eater technology we are familiar with, but rather a bizarre entity known as '§HNecrozma§!'."
EOE_branch.71.a: "Regardless, they must be brought to justice."